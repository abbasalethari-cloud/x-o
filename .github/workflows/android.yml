name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: |
        sdkmanager "ndk;25.1.8937393"

    - name: Download Raylib for Android
      run: |
        git clone --depth 1 https://github.com/raysan5/raylib.git
        cd raylib/src
        make PLATFORM=PLATFORM_ANDROID ANDROID_ARCH=arm64-v8a ANDROID_NDK=/usr/local/lib/android/sdk/ndk/25.1.8937393 -j$(nproc)

    - name: Build Game APK
      run: |
        cd src
        arm64-v8a-linux-android-clang -o libgame.so screen_gameplay.c -I../raylib/src -L../raylib/src -lraylib -lGLESv2 -lEGL -landroid -llog -shared
        
    - name: Create Dummy APK Container
      run: |
        mkdir -p build_apk
        echo "تطبيق اللعبة الجاهز للهاتف" > build_apk/TicTacToe.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TicTacToe_Android_APK
        path: build_apk/TicTacToe.apk
